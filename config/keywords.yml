# 领域关键词配置
# 用于筛选和评分相关论文

domains:
  # 信贷风控和金融风险领域
  credit_risk:
    must_have:
      - credit risk
      - credit scoring
      - default prediction
      - loan default
      - credit assessment
      - risk modeling
      - financial risk
      - credit evaluation
      - risk management
      - financial modeling
      - quantitative finance
      - risk assessment
    boost:
      - fraud detection
      - bankruptcy prediction
      - credit rating
      - lending
      - delinquency
      - probability of default
      - loss given default
      - exposure at default
      - scorecard
      - anti money laundering
      - aml
      - regulatory
      - compliance
      - financial prediction

  # 机器学习领域
  machine_learning:
    must_have:
      - machine learning
      - supervised learning
      - unsupervised learning
      - reinforcement learning
      - transfer learning
      - meta-learning
      - semi-supervised
      - active learning
      - neural network
      - deep learning
    boost:
      - classification
      - clustering
      - feature selection
      - dimensionality reduction
      - ensemble
      - boosting
      - random forest
      - gradient boosting
      - XGBoost
      - LightGBM
      - transformer
      - attention mechanism

# 排除关键词（包含这些词的论文会被过滤掉）
exclude:
  - medical imaging
  - drug discovery
  - protein folding
  - genomics
  - DNA
  - clinical trial
  - pharmaceutical
  - radiology
  - pathology
  - quantum computing
  - quantum machine learning
  - robotics
  - autonomous driving

# 评分权重配置
weights:
  title_match: 10        # 标题包含must_have关键词
  abstract_match: 5      # 摘要包含must_have关键词
  boost_keyword: 2       # 包含boost关键词
  huggingface_source: 3  # 来自Hugging Face（精选论文）
  paperswithcode: 2      # 来自Papers with Code（有代码实现）
