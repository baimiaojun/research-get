# AI摘要生成提示词模板

# 论文摘要生成提示词（结构化格式）
summarize_paper: |
  请用中文总结以下学术论文，使用结构化格式输出：

  标题：{title}
  摘要：{abstract}

  输出格式：
  核心创新：[一句话说明这篇论文解决什么问题、用什么创新方法]

  技术要点：
  - [关键技术点1]
  - [关键技术点2]
  - [关键技术点3]

  主要贡献：[这项研究的价值和应用场景]

  要求：
  1. 核心创新：控制在50字以内，突出"问题+方法"
  2. 技术要点：3个要点，每个15-25字，聚焦技术细节
  3. 主要贡献：30-40字，说明价值和应用
  4. 使用专业术语，简洁准确
  5. 严格按照上述格式输出，不要添加其他内容

# 备用：快速摘要（token更少，成本更低）
summarize_paper_fast: |
  用中文100字总结这篇论文的核心内容：

  标题：{title}
  摘要：{abstract}

  要求：简洁、专业、突出创新点。

# 批量摘要（一次处理多篇，降低API调用次数）
summarize_papers_batch: |
  请为以下{count}篇论文分别生成中文摘要（每篇150字以内）：

  {papers_list}

  要求：
  1. 每篇论文包含：问题动机 + 方法创新 + 效果价值
  2. 按论文编号输出，格式：[编号] 摘要内容
  3. 语言简洁专业

# 错误重试提示词（当首次生成失败时使用）
summarize_paper_retry: |
  请用更简洁的中文总结这篇论文（100字以内）：

  标题：{title}

  核心创新：{brief_abstract}

  直接输出摘要，不要前缀。
