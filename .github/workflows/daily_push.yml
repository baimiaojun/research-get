name: Daily Academic Digest

on:
  # 定时任务：每天UTC 06:00运行（北京时间 14:00）
  # arXiv在美东时间20:00(UTC次日00:00)更新，所以UTC 06:00能确保获取到新论文
  schedule:
    - cron: '0 6 * * *'  # UTC 06:00 = 北京时间 14:00

  # 支持手动触发
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 运行每日推送
        env:
          AI_SERVICE: ${{ secrets.AI_SERVICE }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          PAPERS_TO_SEND: ${{ secrets.PAPERS_TO_SEND }}
        run: |
          python -m src.main

      - name: 📊 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: 💾 上传缓存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-${{ github.run_number }}
          path: data/cache/
          retention-days: 7
          if-no-files-found: ignore
